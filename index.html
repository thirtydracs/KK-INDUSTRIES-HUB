<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K&K Industries</title>

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;

      --risk: #dc2626;
      --watch: #d97706;
      --track: #16a34a;
      --blind: #6b7280;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      padding: 16px;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    /* HEADER */

    .header {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* TOP SUMMARY */

    .top-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
    }

    .summary-left {
      display: flex;
      flex-direction: column;
    }

    .summary-main {
      font-weight: 800;
      font-size: 16px;
    }

    .summary-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .kpi-inline {
      display: flex;
      gap: 10px;
      font-size: 13px;
    }

    .kpi-inline span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .risk { background: var(--risk); }
    .watch { background: var(--watch); }
    .track { background: var(--track); }
    .blind { background: var(--blind); }

    /* FILTERS */

    .filters {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      overflow-x: auto;
    }

    .filter-btn {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #f3f4f6;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-btn.active {
      background: #fff;
      border-color: #bbb;
    }

    /* SEARCH */

    .search-wrap {
      position: relative;
      margin-top: 10px;
    }

    .search {
      width: 100%;
      padding: 10px 36px 10px 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #f9fafb;
    }

    #clearSearch {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      display: none;
      color: #999;
    }
