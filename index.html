<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K&K Industries - Weekly Project Snapshot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="heading">
        <h1>K&K Industries</h1>
        <p>Weekly Project Snapshot</p>
      </div>

      <div class="search-wrap">
        <input
          type="text"
          id="searchInput"
          placeholder="Search jobs, issues, labour, critical path..."
        />
        <button id="clearSearch" class="clear-btn" aria-label="Clear search">×</button>
      </div>
    </div>

    <div class="kpi-strip">
      <div class="kpi-card total">
        <h3>All Jobs</h3>
        <p class="kpi-value" id="totalJobs">0</p>
      </div>

      <div class="kpi-card risk">
        <h3>At Risk</h3>
        <p class="kpi-value" id="atRiskJobs">0</p>
      </div>

      <div class="kpi-card blind">
        <h3>Blind Spots</h3>
        <p class="kpi-value" id="blindSpots">0</p>
      </div>

      <div class="kpi-card updated">
        <h3>Last Updated</h3>
        <p class="kpi-value" id="lastUpdated">-</p>
      </div>
    </div>

    <div class="jobs-grid" id="jobsGrid"></div>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
