<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K&K Industries</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;

      --risk: #dc2626;
      --risk-bg: #fef2f2;

      --watch: #d97706;
      --watch-bg: #fff7ed;

      --track: #16a34a;
      --track-bg: #f0fdf4;

      --blind: #6b7280;
      --blind-bg: #f9fafb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
    }

    .header {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
    }

    .sub {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    .top-summary {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .summary-main {
      font-size: 18px;
      font-weight: 800;
    }

    .summary-sub {
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
    }

    .kpi-inline {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 13px;
      font-weight: 700;
    }

    .kpi-item {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #374151;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .dot.risk { background: var(--risk); }
    .dot.watch { background: var(--watch); }
    .dot.track { background: var(--track); }
    .dot.blind { background: var(--blind); }

    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      margin-top: 14px;
    }

    .filter-btn {
      border: 1px solid #d1d5db;
      background: #f3f4f6;
      color: #374151;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-btn.active {
      background: #ffffff;
      border-color: #9ca3af;
    }

    .search-wrap {
      position: relative;
      margin-top: 10px;
    }

    .search {
      width: 100%;
      border: 1px solid #d1d5db;
      background: #f9fafb;
      border-radius: 10px;
      padding: 11px 40px 11px 12px;
      font-size: 14px;
      outline: none;
    }

    .search:focus {
      border-color: #9ca3af;
      background: #ffffff;
    }

    #clearSearch {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #9ca3af;
      cursor: pointer;
      display: none;
      user-select: none;
      line-height: 1;
    }

    .job-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .job {
      background: var(--card);
      border: 1px solid var(--line);
      border-left: 4px solid #d1d5db;
      border-radius: 16px;
      overflow: hidden;
    }

    .job.risk { border-left-color: var(--risk); }
    .job.watch { border-left-color: var(--watch); }
    .job.track { border-left-color: var(--track); }
    .job.blind { border-left-color: var(--blind); }

    .job-top {
      padding: 16px;
      cursor: pointer;
    }

    .job-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .job-head-left {
      min-width: 0;
      flex: 1;
    }

    .job-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .job-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 800;
    }

    .status {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 5px 8px;
      border-radius: 8px;
      display: inline-block;
    }

    .status.risk {
      background: var(--risk-bg);
      color: #991b1b;
    }

    .status.watch {
      background: var(--watch-bg);
      color: #92400e;
    }

    .status.track {
      background: var(--track-bg);
      color: #166534;
    }

    .status.blind {
      background: var(--blind-bg);
      color: #4b5563;
    }

    .chevron {
      font-size: 12px;
      color: #9ca3af;
      padding-top: 2px;
      flex-shrink: 0;
    }

    .job.open .chevron {
      transform: rotate(180deg);
    }

    .meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 18px;
      margin-top: 14px;
    }

    .label {
      font-size: 11px;
      color: #9ca3af;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px;
    }

    .value {
      font-size: 14px;
      line-height: 1.45;
      color: #374151;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .job-detail {
      display: none;
      border-top: 1px solid var(--line);
      background: #fcfcfd;
      padding: 14px 16px 16px;
    }

    .job.open .job-detail {
      display: block;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 18px;
    }

    .confidence {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #f3f4f6;
      color: #374151;
    }

    .week-activity {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .activity-row {
      padding: 9px 0;
      border-bottom: 1px solid #f1f5f9;
    }

    .activity-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .activity-day {
      font-size: 11px;
      color: #9ca3af;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .empty {
      background: var(--card);
      border: 1px dashed #d1d5db;
      border-radius: 16px;
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .summary-grid,
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .job-title {
        font-size: 15px;
      }

      .summary-main {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>K&amp;K Industries</h1>
      <div class="sub">Weekly site position across active jobs</div>

      <div class="top-summary">
        <div>
          <div class="summary-main">All Jobs <span id="totalJobs">0</span></div>
          <div class="summary-sub">Updated <span id="lastUpdated">-</span></div>
        </div>

        <div class="kpi-inline">
          <div class="kpi-item"><span class="dot risk"></span><span id="riskCount">0</span></div>
          <div class="kpi-item"><span class="dot watch"></span><span id="watchCount">0</span></div>
          <div class="kpi-item"><span class="dot track"></span><span id="trackCount">0</span></div>
          <div class="kpi-item"><span class="dot blind"></span><span id="blindCount">0</span></div>
        </div>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="risk">At Risk</button>
        <button class="filter-btn" data-filter="watch">Watch</button>
        <button class="filter-btn" data-filter="track">On Track</button>
        <button class="filter-btn" data-filter="blind">Blind Spots</button>
      </div>

      <div class="search-wrap">
        <input id="searchInput" class="search" type="text" placeholder="Search jobs..." />
        <span id="clearSearch">✕</span>
      </div>
    </div>

    <div id="jobList" class="job-list"></div>
  </div>

  <script src="data.js"></script>
  <script>
    const jobs = Array.isArray(window.jobs) ? window.jobs : [];

    const jobList = document.getElementById("jobList");
    const searchInput = document.getElementById("searchInput");
    const clearSearch = document.getElementById("clearSearch");
    const filterButtons = document.querySelectorAll(".filter-btn");

    let activeFilter = "all";
    let searchTerm = "";

    function getStatusClass(status) {
      const s = String(status || "").toLowerCase();
      if (s.includes("risk")) return "risk";
      if (s.includes("watch")) return "watch";
      if (s.includes("track")) return "track";
      return "blind";
    }

    function safeText(value, fallback = "-") {
      return value && String(value).trim() ? value : fallback;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return safeText(dateString);
      return date.toLocaleDateString("en-AU", {
        day: "numeric",
        month: "short",
        year: "numeric"
      });
    }

    function updateSummary() {
      document.getElementById("totalJobs").textContent = jobs.length;

      const counts = { risk: 0, watch: 0, track: 0, blind: 0 };

      jobs.forEach(job => {
        counts[getStatusClass(job.status)]++;
      });

      document.getElementById("riskCount").textContent = counts.risk;
      document.getElementById("watchCount").textContent = counts.watch;
      document.getElementById("trackCount").textContent = counts.track;
      document.getElementById("blindCount").textContent = counts.blind;

      const latestDate = jobs
        .map(job => new Date(job.updated))
        .filter(date => !isNaN(date.getTime()))
        .sort((a, b) => b - a)[0];

      document.getElementById("lastUpdated").textContent =
        latestDate ? latestDate.toLocaleDateString("en-AU", {
          day: "numeric",
          month: "short",
          year: "numeric"
        }) : "-";
    }

    function buildWeekActivity(activity) {
      if (!Array.isArray(activity) || !activity.length) {
        return '<div class="value">No activity records available.</div>';
      }

      return activity.map(item => `
        <div class="activity-row">
          <div class="activity-day">${safeText(item.day)}</div>
          <div class="value">${safeText(item.text)}</div>
        </div>
      `).join("");
    }

    function getFilteredJobs() {
      return jobs.filter(job => {
        const statusClass = getStatusClass(job.status);
        const matchesFilter = activeFilter === "all" || statusClass === activeFilter;

        const haystack = [
          job.name,
          job.status,
          job.issue,
          job.labour,
          job.holdingUp,
          job.next,
          job.criticalPath,
          job.reality,
          job.weekEnding,
          job.updated
        ].join(" ").toLowerCase();

        const matchesSearch = haystack.includes(searchTerm.toLowerCase());

        return matchesFilter && matchesSearch;
      });
    }

    function renderJobs() {
      const filteredJobs = getFilteredJobs();

      if (!filteredJobs.length) {
        jobList.innerHTML = '<div class="empty">No jobs match this search or filter.</div>';
        return;
      }

      jobList.innerHTML = filteredJobs.map(job => {
        const statusClass = getStatusClass(job.status);

        return `
          <div class="job ${statusClass}">
            <div class="job-top">
              <div class="job-head">
                <div class="job-head-left">
                  <div class="job-title-row">
                    <h2 class="job-title">${safeText(job.name)}</h2>
                    <span class="status ${statusClass}">${safeText(job.status)}</span>
                  </div>

                  <div class="meta">
                    Week Ending ${formatDate(job.weekEnding)}<br>
                    Updated ${formatDate(job.updated)}
                  </div>
                </div>

                <div class="chevron">▼</div>
              </div>

              <div class="summary-grid">
                <div class="field">
                  <div class="label">Issue</div>
                  <div class="value">${safeText(job.issue)}</div>
                </div>

                <div class="field">
                  <div class="label">Labour</div>
                  <div class="value">${safeText(job.labour)}</div>
                </div>

                <div class="field full">
                  <div class="label">Holding Up</div>
                  <div class="value">${safeText(job.holdingUp)}</div>
                </div>

                <div class="field full">
                  <div class="label">Action Required</div>
                  <div class="value">${safeText(job.next)}</div>
                </div>
              </div>
            </div>

            <div class="job-detail">
              <div class="detail-grid">
                <div class="field">
                  <div class="label">Critical Path</div>
                  <div class="value">${safeText(job.criticalPath)}</div>
                </div>

                <div class="field">
                  <div class="label">Report Confidence</div>
                  <div class="value"><span class="confidence">${safeText(job.dataConfidence)}</span></div>
                </div>

                <div class="field" style="grid-column: 1 / -1;">
                  <div class="label">Reality</div>
                  <div class="value">${safeText(job.reality)}</div>
                </div>
              </div>

              <div class="week-activity">
                <div class="label">Week Activity</div>
                ${buildWeekActivity(job.weekActivity)}
              </div>
            </div>
          </div>
        `;
      }).join("");

      document.querySelectorAll(".job").forEach(card => {
        card.addEventListener("click", () => {
          card.classList.toggle("open");
        });
      });
    }

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        filterButtons.forEach(btn => btn.classList.remove("active"));
        button.classList.add("active");
        activeFilter = button.dataset.filter;
        renderJobs();
      });
    });

    searchInput.addEventListener("input", (event) => {
      searchTerm = event.target.value.trim();
      clearSearch.style.display = searchTerm ? "block" : "none";
      renderJobs();
    });

    clearSearch.addEventListener("click", (event) => {
      event.stopPropagation();
      searchInput.value = "";
      searchTerm = "";
      clearSearch.style.display = "none";
      activeFilter = "all";

      filterButtons.forEach(btn => btn.classList.remove("active"));
      document.querySelector('[data-filter="all"]').classList.add("active");

      renderJobs();
    });

    updateSummary();
    renderJobs();
  </script>
</body>
</html>
