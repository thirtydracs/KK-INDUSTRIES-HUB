<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K&K Industries</title>

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;

      --risk: #dc2626;
      --watch: #d97706;
      --track: #16a34a;
      --blind: #6b7280;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      padding: 16px;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    /* HEADER */

    .header {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* TOP SUMMARY */

    .top-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
    }

    .summary-left {
      display: flex;
      flex-direction: column;
    }

    .summary-main {
      font-weight: 800;
      font-size: 16px;
    }

    .summary-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .kpi-inline {
      display: flex;
      gap: 10px;
      font-size: 13px;
    }

    .kpi-inline span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .risk { background: var(--risk); }
    .watch { background: var(--watch); }
    .track { background: var(--track); }
    .blind { background: var(--blind); }

    /* FILTERS */

    .filters {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      overflow-x: auto;
    }

    .filter-btn {
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #f3f4f6;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .filter-btn.active {
      background: #fff;
      border-color: #bbb;
    }

    /* SEARCH */

    .search-wrap {
      position: relative;
      margin-top: 10px;
    }

    .search {
      width: 100%;
      padding: 10px 36px 10px 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      background: #f9fafb;
    }

    #clearSearch {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      display: none;
      color: #999;
    }

    /* JOB CARDS */

    .job-list {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .job {
      background: #fff;
      border-radius: 16px;
      border-left: 4px solid #ccc;
      border: 1px solid var(--line);
      padding: 14px;
      cursor: pointer;
    }

    .job.risk { border-left-color: var(--risk); }
    .job.watch { border-left-color: var(--watch); }
    .job.track { border-left-color: var(--track); }
    .job.blind { border-left-color: var(--blind); }

    .job-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .job-title {
      font-size: 16px;
      font-weight: 800;
    }

    .status {
      font-size: 11px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 8px;
    }

    .status.risk { background: #fee2e2; }
    .status.watch { background: #ffedd5; }
    .status.track { background: #dcfce7; }
    .status.blind { background: #f3f4f6; }

    .meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .main {
      margin-top: 10px;
      font-size: 14px;
    }

    .label {
      font-size: 11px;
      color: #999;
      margin-top: 10px;
      font-weight: 700;
    }

    .detail {
      display: none;
      margin-top: 10px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

    .job.open .detail {
      display: block;
    }

    .empty {
      text-align: center;
      padding: 20px;
      color: #999;
    }
  </style>
</head>

<body>
<div class="wrap">

  <div class="header">
    <h1>K&K Industries</h1>
    <div class="sub">Weekly site position across active jobs</div>

    <div class="top-summary">
      <div class="summary-left">
        <div class="summary-main">
          All Jobs <span id="totalJobs">0</span>
        </div>
        <div class="summary-sub">
          Updated <span id="lastUpdated">-</span>
        </div>
      </div>

      <div class="kpi-inline">
        <span><div class="dot risk"></div><b id="riskCount">0</b></span>
        <span><div class="dot watch"></div><b id="watchCount">0</b></span>
        <span><div class="dot track"></div><b id="trackCount">0</b></span>
        <span><div class="dot blind"></div><b id="blindCount">0</b></span>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data="all">All</button>
      <button class="filter-btn" data="risk">At Risk</button>
      <button class="filter-btn" data="watch">Watch</button>
      <button class="filter-btn" data="track">On Track</button>
      <button class="filter-btn" data="blind">Blind</button>
    </div>

    <div class="search-wrap">
      <input id="searchInput" class="search" placeholder="Search jobs..." />
      <span id="clearSearch">✕</span>
    </div>
  </div>

  <div id="jobList" class="job-list"></div>

</div>

<script src="data.js"></script>
<script>
const jobs = window.jobs || [];

const jobList = document.getElementById("jobList");
const searchInput = document.getElementById("searchInput");
const clearBtn = document.getElementById("clearSearch");

let filter = "all";
let search = "";

/* SUMMARY */

function updateSummary() {
  document.getElementById("totalJobs").innerText = jobs.length;

  const latest = jobs
    .map(j => new Date(j.updated))
    .sort((a,b)=>b-a)[0];

  document.getElementById("lastUpdated").innerText =
    latest ? latest.toLocaleDateString("en-AU") : "-";

  let counts = {risk:0,watch:0,track:0,blind:0};

  jobs.forEach(j=>{
    const s = j.status.toLowerCase();
    if(s.includes("risk")) counts.risk++;
    else if(s.includes("watch")) counts.watch++;
    else if(s.includes("track")) counts.track++;
    else counts.blind++;
  });

  document.getElementById("riskCount").innerText = counts.risk;
  document.getElementById("watchCount").innerText = counts.watch;
  document.getElementById("trackCount").innerText = counts.track;
  document.getElementById("blindCount").innerText = counts.blind;
}

/* RENDER */

function render() {
  const filtered = jobs.filter(j => {
    const s = j.status.toLowerCase();

    const matchFilter = filter === "all" || s.includes(filter);

    const matchSearch = (
      j.name + j.issue + j.holdingUp
    ).toLowerCase().includes(search.toLowerCase());

    return matchFilter && matchSearch;
  });

  if(!filtered.length){
    jobList.innerHTML = '<div class="empty">No jobs</div>';
    return;
  }

  jobList.innerHTML = filtered.map((j,i)=>`
    <div class="job ${j.status.toLowerCase().includes("risk")?"risk":
                     j.status.toLowerCase().includes("watch")?"watch":
                     j.status.toLowerCase().includes("track")?"track":"blind"}">

      <div class="job-top">
        <div class="job-title">${j.name}</div>
        <div class="status">${j.status}</div>
      </div>

      <div class="meta">
        Week Ending ${j.weekEnding} • Updated ${j.updated}
      </div>

      <div class="main">
        <b>Holding Up:</b> ${j.holdingUp}
      </div>

      <div class="label">Action Required</div>
      <div>${j.next}</div>

      <div class="detail">
        <div class="label">Reality</div>
        <div>${j.reality}</div>
      </div>

    </div>
  `).join("");

  document.querySelectorAll(".job").forEach(el=>{
    el.onclick=()=>el.classList.toggle("open");
  });
}

/* FILTER */

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    filter = btn.getAttribute("data");
    render();
  }
});

/* SEARCH */

searchInput.oninput = (e)=>{
  search = e.target.value;
  clearBtn.style.display = search ? "block":"none";
  render();
};

clearBtn.onclick = ()=>{
  searchInput.value="";
  search="";
  filter="all";
  clearBtn.style.display="none";

  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  document.querySelector('[data="all"]').classList.add("active");

  render();
};

/* INIT */

updateSummary();
render();
</script>
</body>
</html>
